services:
  db:
    image: postgres:16
    container_name: restaurant_booking_db
    restart: always
    environment:
      POSTGRES_DB: restaurant_booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:



